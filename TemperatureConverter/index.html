<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Temperature Converter</title>
  </head>
  <body>
    <main class="container">
      <h1 class="main-heading">Temperature Converter</h1>
      <div class="box">
        <p class="unit">Celsius:</p>
        <input type="number" class="input input-c" onfocus="this.select()" />
      </div>
      <div class="box">
        <p class="unit">Fahrenheit:</p>
        <input type="number" class="input input-f" onfocus="this.select()" />
      </div>
      <div class="box">
        <p class="unit">Kelvin:</p>
        <input type="number" class="input input-k" onfocus="this.select()" />
      </div>
      <button class="btn-submit">Submit</button>
    </main>
    <script src="script.js"></script>
  </body>
</html>
